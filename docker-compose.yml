services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiwearstudio}
      POSTGRES_USER: ${POSTGRES_USER:-aiwear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev}
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiwear}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: src/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Jwt__Secret: ${JWT_SECRET:-dev_secret_min_32_chars_changeme!!_abc}
      Jwt__Issuer: ai-wear-studio
      Jwt__Audience: ai-wear-studio-clients
      Jwt__TtlMinutes: 60
      Jwt__RefreshTokenTtlDays: 30
      ConnectionStrings__Users: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-aiwearstudio};Username=${POSTGRES_USER:-aiwear};Password=${POSTGRES_PASSWORD:-changeme_dev};Search Path=users"
      ConnectionStrings__CompanyAdmin: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-aiwearstudio};Username=${POSTGRES_USER:-aiwear};Password=${POSTGRES_PASSWORD:-changeme_dev};Search Path=company_admin"
      ConnectionStrings__Catalog: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-aiwearstudio};Username=${POSTGRES_USER:-aiwear};Password=${POSTGRES_PASSWORD:-changeme_dev};Search Path=catalog"
      ConnectionStrings__DesignEngine: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-aiwearstudio};Username=${POSTGRES_USER:-aiwear};Password=${POSTGRES_PASSWORD:-changeme_dev};Search Path=design_engine"
      Redis__ConnectionString: redis:6379
      Catalog__CacheTtlSeconds: 300
      MinIO__Endpoint: minio:9000
      MinIO__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      MinIO__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      MinIO__UseSSL: "false"
      MinIO__PublicBaseUrl: http://localhost:9000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
